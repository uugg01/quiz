
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --roman-red: #8B1A1A;
    --roman-red-light: #C0392B;
    --parchment: #F5EDD6;
    --parchment-dark: #E8D9B5;
    --med-blue: #1B4F72;
    --gold: #B8860B;
    --gold-light: #D4A017;
    --ink: #2C1810;
    --correct: #2E7D32;
    --wrong: #8B1A1A;
    --hint: #5D4037;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, #quiz-app {
    font-family: 'Crimson Text', Georgia, serif;
    background: transparent;
  }

  #quiz-app {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    min-height: 500px;
  }

  .header-band {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--roman-red);
  }

  .title-block h1 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--roman-red);
    letter-spacing: 0.5px;
  }

  .title-block p {
    font-size: 13px;
    color: var(--ink);
    opacity: 0.7;
    margin-top: 2px;
  }

  .score-badge {
    background: var(--roman-red);
    color: var(--parchment);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .progress-row {
    display: flex;
    gap: 4px;
    margin-bottom: 1.25rem;
  }

  .progress-dot {
    flex: 1;
    height: 5px;
    background: var(--parchment-dark);
    border-radius: 3px;
    transition: background 0.4s;
    border: 1px solid var(--gold);
  }

  .progress-dot.done { background: var(--roman-red); border-color: var(--roman-red); }
  .progress-dot.current { background: var(--gold-light); border-color: var(--gold); }

  .question-card {
    background: var(--parchment);
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--roman-red), var(--gold-light), var(--roman-red));
  }

  .q-number {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.5;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 0.75rem;
  }

  .answer-btn {
    background: var(--parchment);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
    position: relative;
  }

  .answer-btn:hover:not(:disabled) {
    background: var(--parchment-dark);
    border-color: var(--roman-red);
    transform: translateY(-1px);
  }

  .answer-btn.correct {
    background: #E8F5E9;
    border-color: var(--correct);
    color: var(--correct);
    font-weight: 600;
  }

  .answer-btn.wrong {
    background: #FFEBEE;
    border-color: var(--wrong);
    color: var(--wrong);
    text-decoration: line-through;
    opacity: 0.8;
  }

  .answer-btn:disabled { cursor: default; }

  .letter-tag {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    margin-right: 6px;
  }

  .hint-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .hint-btn {
    background: transparent;
    border: 1.5px solid var(--gold);
    border-radius: 20px;
    padding: 5px 14px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .hint-btn:hover { background: var(--gold); color: var(--parchment); }

  .hint-icon {
    width: 16px; height: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .hint-box {
    background: var(--parchment-dark);
    border: 1px dashed var(--hint);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 14px;
    font-style: italic;
    color: var(--hint);
    flex: 1;
    line-height: 1.4;
  }

  .feedback-row {
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .feedback-row.show { opacity: 1; }
  .feedback-row.correct-fb { background: #E8F5E9; color: var(--correct); }
  .feedback-row.wrong-fb { background: #FFEBEE; color: var(--wrong); }

  .next-btn {
    display: block;
    width: 100%;
    padding: 0.75rem;
    background: var(--roman-red);
    color: var(--parchment);
    border: none;
    border-radius: 10px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .next-btn:hover { background: var(--roman-red-light); }
  .next-btn.visible { display: block; }

  .end-screen {
    text-align: center;
    padding: 2rem 1rem;
    display: none;
  }

  .end-screen.show { display: block; }

  .shield-icon {
    font-size: 56px;
    margin-bottom: 1rem;
  }

  .end-title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--roman-red);
    margin-bottom: 0.5rem;
  }

  .end-subtitle {
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 1.5rem;
    opacity: 0.8;
  }

  .final-score {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--roman-red);
    margin-bottom: 0.25rem;
  }

  .rank-label {
    font-size: 15px;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 1.5rem;
  }

  .restart-btn {
    background: var(--roman-red);
    color: var(--parchment);
    border: none;
    border-radius: 10px;
    padding: 0.75rem 2rem;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
  }

  .restart-btn:hover { background: var(--roman-red-light); }

  .quiz-body { display: block; }
  .quiz-body.hidden { display: none; }
</style>

<div id="quiz-app">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">Ancient Rome quiz for 4th grade primary school students</h2>

  <div class="header-band">
    <div class="title-block">
      <h1>⚔ Roman Empire Quiz</h1>
      <p>4th Grade · Ancient Rome</p>
    </div>
    <div class="score-badge" id="score-display">⭐ 0</div>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <div class="quiz-body" id="quiz-body">
    <div class="question-card">
      <div class="q-number" id="q-number">QUESTION 1 OF 8</div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div class="hint-row">
      <button class="hint-btn" id="hint-btn" onclick="showHint()">
        <span class="hint-icon">🏛</span> Hint
      </button>
      <div class="hint-box" id="hint-box" style="display:none"></div>
    </div>

    <div class="answers-grid" id="answers-grid"></div>

    <div class="feedback-row" id="feedback-row"></div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="end-screen" id="end-screen">
    <div class="shield-icon" id="end-icon">🏛</div>
    <div class="end-title" id="end-title"></div>
    <div class="end-subtitle" id="end-subtitle"></div>
    <div class="final-score" id="final-score"></div>
    <div class="rank-label" id="rank-label"></div>
    <button class="restart-btn" onclick="restartQuiz()">Play Again ↗</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "When was the city of Rome founded?",
    options: ["753 BC", "476 AD", "100 BC", "1000 BC"],
    correct: 0,
    hint: "It was many centuries before the birth of Jesus Christ. Think: seven hundred and fifty..."
  },
  {
    q: "What did the Romans call the Mediterranean Sea?",
    options: ["Mare Magnum", "Mare Nostrum", "Oceanus Romanus", "Aqua Magna"],
    correct: 1,
    hint: "The Romans were very proud — they called it 'Our...' something. It was Latin!"
  },
  {
    q: "What name did the Romans give to the Iberian Peninsula?",
    options: ["Gallia", "Britannia", "Hispania", "Lusitania"],
    correct: 2,
    hint: "It sounds a bit like the name of a modern country in Europe..."
  },
  {
    q: "What were the big, beautiful houses of rich Romans called?",
    options: ["Insulae", "Forum", "Domus", "Thermae"],
    correct: 2,
    hint: "Think of the English word 'domestic' — it comes from the same Latin word!"
  },
  {
    q: "What Roman structure carried fresh water into cities from far away?",
    options: ["Amphitheatre", "Aqueduct", "Forum", "City Wall"],
    correct: 1,
    hint: "'Aqua' means water in Latin — which building has 'aqua' in its name?"
  },
  {
    q: "Which language did the Romans spread across their empire that later became Spanish, French and Italian?",
    options: ["Greek", "Celtic", "Latin", "Aramaic"],
    correct: 2,
    hint: "You still learn some of this language in school — it's the language of ancient Rome!"
  },
  {
    q: "In what year did the Roman Empire fall?",
    options: ["AD 100", "AD 476", "AD 753", "AD 250"],
    correct: 1,
    hint: "Look for four hundred and... after the birth of Jesus. It's less than 500!"
  },
  {
    q: "What were the tall, crowded apartment blocks where poorer Romans lived called?",
    options: ["Domus", "Fora", "Thermae", "Insulae"],
    correct: 3,
    hint: "Think of islands — in Latin, 'insula' means island. These blocks stood alone like islands in the city."
  }
];

const letters = ['A', 'B', 'C', 'D'];
let current = 0;
let score = 0;
let hintShown = false;
let answered = false;

function buildProgress() {
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i < current ? ' done' : i === current ? ' current' : '');
    row.appendChild(dot);
  });
}

function loadQuestion() {
  answered = false;
  hintShown = false;
  const q = questions[current];
  document.getElementById('q-number').textContent = `QUESTION ${current + 1} OF ${questions.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('hint-box').style.display = 'none';
  document.getElementById('hint-box').textContent = '';
  document.getElementById('hint-btn').disabled = false;
  document.getElementById('hint-btn').style.opacity = '1';

  const fb = document.getElementById('feedback-row');
  fb.className = 'feedback-row';
  fb.textContent = '';

  const next = document.getElementById('next-btn');
  next.classList.remove('visible');

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter-tag">${letters[i]}.</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  buildProgress();
}

function showHint() {
  if (hintShown || answered) return;
  hintShown = true;
  const q = questions[current];
  const box = document.getElementById('hint-box');
  box.textContent = '🏛 ' + q.hint;
  box.style.display = 'block';
  document.getElementById('hint-btn').disabled = true;
  document.getElementById('hint-btn').style.opacity = '0.5';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx && i !== q.correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback-row');
  if (idx === q.correct) {
    score++;
    document.getElementById('score-display').textContent = '⭐ ' + score;
    fb.className = 'feedback-row correct-fb show';
    fb.textContent = '✓ Excellent! That is correct!';
  } else {
    fb.className = 'feedback-row wrong-fb show';
    fb.textContent = '✗ Not quite — the correct answer is highlighted in green.';
  }

  const next = document.getElementById('next-btn');
  next.textContent = current < questions.length - 1 ? 'Next →' : 'See Results →';
  next.classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showEnd();
  } else {
    loadQuestion();
  }
}

function showEnd() {
  document.getElementById('quiz-body').classList.add('hidden');
  const end = document.getElementById('end-screen');
  end.classList.add('show');

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('final-score').textContent = score + ' / ' + questions.length;

  let icon, title, subtitle, rank;
  if (score >= 7) {
    icon = '🏆'; title = 'Roman Champion!';
    subtitle = 'The Senate is proud of you!';
    rank = '⭐ Rank: Caesar';
  } else if (score >= 5) {
    icon = '⚔'; title = 'Roman Soldier!';
    subtitle = 'You know your history well!';
    rank = '⭐ Rank: Centurion';
  } else if (score >= 3) {
    icon = '🏛'; title = 'Roman Citizen!';
    subtitle = 'Keep studying — Rome was built slowly!';
    rank = '⭐ Rank: Citizen';
  } else {
    icon = '📜'; title = 'Keep Exploring!';
    subtitle = 'Review the slides and try again!';
    rank = '⭐ Rank: Apprentice';
  }

  document.getElementById('end-icon').textContent = icon;
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-subtitle').textContent = subtitle;
  document.getElementById('rank-label').textContent = rank;
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = false;
  hintShown = false;
  document.getElementById('score-display').textContent = '⭐ 0';
  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('quiz-body').classList.remove('hidden');
  loadQuestion();
}

loadQuestion();
</script>
